<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التعلم الذكي</title>
    <style>
        :root {
            --primary: #09769f;
            --accent: #7BBDE8;
            --bg-overlay: rgba(255, 255, 255, 0.9);
            --text-color: #09769f;
            --card-bg: rgba(123, 189, 232, 0.15);
        }

        [data-theme="dark"] {
            --primary: #7BBDE8;
            --accent: #09769f;
            --bg-overlay: rgba(9, 118, 159, 0.9);
            --text-color: #f0f0f0;
            --card-bg: rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.3s, color 0.3s;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('wall.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
        }

        /* Dark Mode Toggle */
        .theme-switch {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--bg-overlay);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid var(--accent);
            padding-bottom: 20px;
        }

        .header img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid var(--accent);
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .notes-area {
            width: 100%;
            max-width: 600px;
            margin: 20px auto;
            display: block;
        }

        textarea {
            width: 100%;
            height: 80px;
            border-radius: 15px;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--text-color);
            padding: 15px;
            font-family: inherit;
            resize: none;
        }

        /* Video Grid */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(123, 189, 232, 0.3);
            transition: transform 0.3s;
        }

        .video-card:hover {
            transform: translateY(-5px);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .enlarge-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* Special Essay Row */
        .essay-section {
            grid-column: 1 / -1;
            display: flex;
            background: var(--primary);
            color: white;
            border-radius: 20px;
            overflow: hidden;
            align-items: center;
            margin-top: 20px;
        }

        .essay-text {
            flex: 1;
            padding: 30px;
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
        }

        .essay-video {
            flex: 1.5;
            position: relative;
            padding-top: 30%;
        }

        /* Modal for Enlarged Video */
        #video-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #modal-content {
            width: 90%;
            max-width: 1000px;
            position: relative;
        }

        #modal-video {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 0 30px var(--accent);
        }

        .close-modal {
            position: absolute;
            top: -50px;
            right: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* Brain Notification */
        #brain-popup {
            position: fixed;
            bottom: 30px;
            right: -400px;
            background: var(--accent);
            color: white;
            padding: 15px 25px;
            border-radius: 15px 0 0 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: -5px 5px 20px rgba(0,0,0,0.3);
            transition: right 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1500;
        }

        #brain-popup.active {
            right: 0;
        }

        #brain-popup img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
        }

        @media (max-width: 768px) {
            .essay-section {
                flex-direction: column;
            }
            .essay-video {
                width: 100%;
                padding-top: 56.25%;
            }
            .container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <button class="theme-switch" onclick="toggleTheme()">🌓 تبديل الوضع</button>

    <div class="container">
        <header class="header">
            <img src="rakez.jpg" alt="Focus">
            <h1>ركز واستعد! 💡</h1>
            <div class="notes-area">
                <textarea placeholder="اكتب ملاحظاتك المهمة هنا أثناء المشاهدة..."></textarea>
            </div>
        </header>

        <div class="video-grid">
            <!-- Videos 1 to 6 -->
            <div class="video-card">
                <div class="video-wrapper">
                    <video src="q1.mp4" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>
                </div>
                <div class="card-info">
                    <span>الفيديو الأول 01</span>
                    <button class="enlarge-btn" onclick="openVideo('q1.mp4')">تكبير 🔍</button>
                </div>
            </div>

            <div class="video-card">
                <div class="video-wrapper">
                    <video src="q2.mp4" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>
                </div>
                <div class="card-info">
                    <span>الفيديو الثاني 02</span>
                    <button class="enlarge-btn" onclick="openVideo('q2.mp4')">تكبير 🔍</button>
                </div>
            </div>

            <div class="video-card">
                <div class="video-wrapper">
                    <video src="q3.mp4" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>
                </div>
                <div class="card-info">
                    <span>الفيديو الثالث 03</span>
                    <button class="enlarge-btn" onclick="openVideo('q3.mp4')">تكبير 🔍</button>
                </div>
            </div>

            <div class="video-card">
                <div class="video-wrapper">
                    <video src="q4.mp4" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>
                </div>
                <div class="card-info">
                    <span>الفيديو الرابع 04</span>
                    <button class="enlarge-btn" onclick="openVideo('q4.mp4')">تكبير 🔍</button>
                </div>
            </div>

            <div class="video-card">
                <div class="video-wrapper">
                    <video src="q5.mp4" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>
                </div>
                <div class="card-info">
                    <span>الفيديو الخامس 05</span>
                    <button class="enlarge-btn" onclick="openVideo('q5.mp4')">تكبير 🔍</button>
                </div>
            </div>

            <div class="video-card">
                <div class="video-wrapper">
                    <video src="q6.mp4" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>
                </div>
                <div class="card-info">
                    <span>الفيديو السادس 06</span>
                    <button class="enlarge-btn" onclick="openVideo('q6.mp4')">تكبير 🔍</button>
                </div>
            </div>

            <!-- Essay Video Section -->
            <div class="essay-section">
                <div class="essay-text">
                    📝 سؤال مقالي هام
                </div>
                <div class="essay-video video-wrapper">
                    <video src="mkali.mp4" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>
                    <button class="enlarge-btn" style="position: absolute; bottom: 10px; left: 10px;" onclick="openVideo('mkali.mp4')">تكبير 🔍</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for enlarging -->
    <div id="video-modal" onclick="closeVideo()">
        <div id="modal-content" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="closeVideo()">✕</button>
            <video id="modal-video" controls></video>
        </div>
    </div>

    <!-- Notification -->
    <div id="brain-popup">
        <img src="mokh.jpg" alt="Brain">
        <div>
            <strong>تنبيه ذكي!</strong><br>
            <span>شغل مخك وركز في التفاصيل 🧠</span>
        </div>
    </div>

    <script>
        // Dark Mode Logic
        function toggleTheme() {
            const body = document.body;
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
            } else {
                body.setAttribute('data-theme', 'dark');
            }
        }

        // Enlarge Video Logic
        const modal = document.getElementById('video-modal');
        const modalVid = document.getElementById('modal-video');

        function openVideo(src) {
            modalVid.src = src;
            modal.style.display = 'flex';
            modalVid.play();
        }

        function closeVideo() {
            modal.style.display = 'none';
            modalVid.pause();
            modalVid.src = '';
        }

        // Brain Notification Popup Logic
        function showBrainPopup() {
            const popup = document.getElementById('brain-popup');
            popup.classList.add('active');
            
            setTimeout(() => {
                popup.classList.remove('active');
            }, 5000);
        }

        // Show every 30 seconds
        setInterval(showBrainPopup, 30000);
        // First show after 10 seconds
        setTimeout(showBrainPopup, 10000);

        // Escape key to close modal
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeVideo();
        });
    </script>
</body>
</html>
