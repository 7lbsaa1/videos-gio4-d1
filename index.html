<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فيديوهات تعليمية</title>
    <style>
        :root {
            --primary-rgb: 9, 118, 159;
            --secondary-rgb: 123, 189, 232;
        }
        body.light-mode {
            --primary-rgb: 123, 189, 232;
            --secondary-rgb: 9, 118, 159;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background-image: url('wall.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: rgb(var(--primary-rgb));
            color: rgb(var(--secondary-rgb));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            gap: 30px;
            overflow-x: hidden;
            transition: background-color 0.3s ease;
        }
        #mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(var(--secondary-rgb), 0.9);
            color: rgb(var(--primary-rgb));
            border: none;
            padding: 15px 20px;
            border-radius: 50px;
            font-size: 1.5em;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        #mode-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        #focus-banner {
            background: rgba(var(--primary-rgb), 0.92);
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(var(--secondary-rgb), 0.3);
        }
        #focus-banner img {
            width: 120px;
            height: auto;
            border-radius: 50%;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        #focus-banner h1 {
            font-size: 3em;
            margin-bottom: 15px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.6);
        }
        #focus-banner p {
            font-size: 1.3em;
            margin-bottom: 20px;
        }
        #notes {
            width: 100%;
            min-height: 120px;
            padding: 20px;
            border-radius: 15px;
            border: 3px solid rgb(var(--secondary-rgb));
            background: rgba(var(--secondary-rgb), 0.15);
            color: rgb(var(--secondary-rgb));
            font-size: 1.1em;
            resize: vertical;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .video-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            width: 100%;
            max-width: 900px;
        }
        .video-card {
            width: 100%;
            background: rgba(var(--secondary-rgb), 0.25);
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 10px 35px rgba(0,0,0,0.25);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(var(--secondary-rgb), 0.2);
            cursor: pointer;
        }
        .video-card:hover {
            background: rgba(var(--secondary-rgb), 0.55);
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 25px 50px rgba(0,0,0,0.45);
        }
        .video-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        .video-card video {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        .video-card video:hover {
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .video-card h3 {
            font-size: 2.2em;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.6);
            margin: 0;
        }
        .essay-card {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            align-items: center;
        }
        .essay-card .essay-label {
            background: rgb(var(--primary-rgb));
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            font-size: 2.2em;
            font-weight: bold;
            text-shadow: 3px 3px 8px rgba(0,0,0,0.7);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 0 25px rgba(var(--secondary-rgb), 0.4);
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(var(--primary-rgb), 0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(20px);
        }
        .modal video {
            max-width: 95vw;
            max-height: 95vh;
            width: auto;
            height: auto;
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }
        .modal-close {
            position: absolute;
            top: 40px;
            right: 40px;
            background: rgba(var(--secondary-rgb), 0.95);
            color: rgb(var(--primary-rgb));
            border: none;
            padding: 20px 25px;
            font-size: 2em;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            z-index: 2001;
        }
        .modal-close:hover {
            transform: scale(1.2);
            background: rgb(var(--secondary-rgb));
        }
        #brain-notification {
            position: fixed;
            top: 50%;
            right: -400px;
            transform: translateY(-50%);
            background: rgba(var(--primary-rgb), 0.97);
            padding: 30px;
            border-radius: 25px 0 0 25px;
            box-shadow: -15px 0 40px rgba(0,0,0,0.5);
            transition: right 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 20px;
            max-width: 400px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(var(--secondary-rgb), 0.3);
        }
        #brain-notification.show {
            right: 0;
        }
        #brain-notification img {
            width: 80px;
            height: auto;
            border-radius: 50%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        #brain-notification h2 {
            font-size: 2.5em;
            text-shadow: 3px 3px 8px rgba(0,0,0,0.8);
            margin: 0;
        }
        @media (max-width: 768px) {
            body {
                padding: 15px;
                gap: 25px;
            }
            .video-container {
                gap: 30px;
            }
            .video-card {
                padding: 25px;
            }
            .video-card video, .essay-card .essay-label {
                height: 180px;
            }
            #focus-banner h1 {
                font-size: 2.2em;
            }
            .essay-card {
                grid-template-columns: 1fr;
                gap: 25px;
            }
            .essay-card .essay-label {
                grid-row: 1;
                height: 180px;
                font-size: 1.8em;
                padding: 30px 20px;
            }
            .essay-card video {
                grid-row: 2;
            }
            #mode-toggle {
                top: 15px;
                right: 15px;
                padding: 12px 18px;
                font-size: 1.3em;
            }
            .modal-close {
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <button id="mode-toggle">☀️</button>

    <div id="focus-banner">
        <img src="rakez.jpg" alt="ركز">
        <h1>ركز</h1>
        <p>اكتب أي ملاحظات مهمة:</p>
        <textarea id="notes" placeholder="اكتب ملاحظاتك المهمة هنا..."></textarea>
    </div>

    <div class="video-container">
        <div class="video-card">
            <div class="video-wrapper">
                <video src="q1.mp4" controls preload="metadata"></video>
            </div>
            <h3>سؤال ١</h3>
        </div>
        <div class="video-card">
            <div class="video-wrapper">
                <video src="q2.mp4" controls preload="metadata"></video>
            </div>
            <h3>سؤال ٢</h3>
        </div>
        <div class="video-card">
            <div class="video-wrapper">
                <video src="q3.mp4" controls preload="metadata"></video>
            </div>
            <h3>سؤال ٣</h3>
        </div>
        <div class="video-card">
            <div class="video-wrapper">
                <video src="q4.mp4" controls preload="metadata"></video>
            </div>
            <h3>سؤال ٤</h3>
        </div>
        <div class="video-card">
            <div class="video-wrapper">
                <video src="q5.mp4" controls preload="metadata"></video>
            </div>
            <h3>سؤال ٥</h3>
        </div>
        <div class="video-card">
            <div class="video-wrapper">
                <video src="q6.mp4" controls preload="metadata"></video>
            </div>
            <h3>سؤال ٦</h3>
        </div>
        <div class="video-card essay-card">
            <div class="essay-label">سؤال مقالي</div>
            <div class="video-wrapper">
                <video src="mkali.mp4" controls preload="metadata"></video>
            </div>
        </div>
    </div>

    <div id="brain-notification">
        <img src="mokh.jpg" alt="شغل مخك">
        <h2>شغل مخك!</h2>
    </div>

    <script>
        // Dark/Light mode toggle
        const toggle = document.getElementById('mode-toggle');
        toggle.textContent = '☀️'; // Default dark, toggle to light
        toggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            toggle.textContent = document.body.classList.contains('light-mode') ? '🌙' : '☀️';
        });

        // Video enlarge modal
        let modal = null;
        function openModal(src) {
            if (modal) modal.remove();
            modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <button class="modal-close">&times;</button>
                <video src="${src}" controls autoplay></video>
            `;
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
            modal.querySelector('.modal-close').addEventListener('click', () => modal.remove());
            document.body.appendChild(modal);
            modal.querySelector('video').focus();
        }

        // Close modal on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal) {
                modal.remove();
            }
        });

        // Click video to enlarge
        document.querySelectorAll('video').forEach(video => {
            video.addEventListener('click', (e) => {
                e.stopPropagation();
                openModal(video.src);
            });
        });

        // Hover preview play
        document.querySelectorAll('.video-card').forEach(card => {
            const video = card.querySelector('video');
            card.addEventListener('mouseenter', () => {
                video.currentTime = 0;
                video.play().catch(() => {});
            });
            card.addEventListener('mouseleave', () => {
                video.pause();
            });
        });

        // Periodic brain message
        setInterval(() => {
            const notification = document.getElementById('brain-notification');
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 4500);
        }, 20000);

        // Click to dismiss brain notification
        document.getElementById('brain-notification').addEventListener('click', function() {
            this.classList.remove('show');
        });
    </script>
</body>
</html>
